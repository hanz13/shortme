    <script>
      // Graceful safeguard for sandboxed iframe contexts and browser extensions/adblockers
      // trying to inject or proxy the global fetch method when override options are locked.
      (function() {
        try {
          var orig = window.fetch;
          if (orig) {
            var current = orig;
            var desc = Object.getOwnPropertyDescriptor(window, 'fetch') || 
                       Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch') || {};
            if (!desc.set) {
              Object.defineProperty(window, 'fetch', {
                get: function() { return current; },
                set: function(val) { current = val; },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn('Graceful fetch handler bypass disabled:', e);
        }
      })();
    </script>
